<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #ff4444;
    --accent-dim: rgba(255, 68, 68, 0.15);
    --accent-glow: rgba(255, 68, 68, 0.4);
    --green: #22c55e;
    --yellow: #f59e0b;
    --text: #e8e8f0;
    --text-dim: #6b6b80;
    --text-mid: #a0a0b8;
    --movie-color: #60a5fa;
    --series-color: #a78bfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    width: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* ─── HEADER ─────────────────────────────────────────────── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10, 10, 15, 0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    flex-shrink: 1;
    min-width: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .logo-icon { display:flex; align-items:center; justify-content:center; }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo-text span { color: var(--accent); }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  /* ── Services pill + dropdown ── */
  .services-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px 4px 8px;
    cursor: pointer;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    position: relative;
    user-select: none;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .services-pill:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
  .services-pill .pill-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
  }
  .services-pill .pill-dot.has-error { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .services-pill .pill-arrow {
    font-size: 9px; margin-left: 2px; transition: transform 0.2s;
  }
  .services-pill.open .pill-arrow { transform: rotate(180deg); }
  .services-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    left: auto;
    background: #1e1e1e;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 6px;
    min-width: 180px;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .services-pill.open .services-dropdown { display: block; }
  /* Prevent dropdown from overflowing viewport */
  @media (max-width: 768px) {
    .services-dropdown {
      position: fixed !important;
      top: 50px !important;
      left: 10px !important;
      right: 10px !important;
      min-width: auto !important;
    }
  }
  .svc-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 5px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
  }
  .svc-row:hover { background: rgba(255,255,255,0.05); }
  .svc-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-dim); flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .svc-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .svc-dot.offline { background: var(--accent); }
  .svc-name { flex: 1; }
  .svc-badge { font-size: 9px; color: var(--text-dim); }
  /* Legacy — keep for compat */
  .status-item { display: none; }
  .status-dot { display: none; }

  /* Stats strip */
  .settings-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-dim);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  white-space: nowrap;
  user-select: none;
  text-decoration: none;
}
.settings-pill:hover {
  color: var(--text);
  border-color: #3a3a50;
  background: var(--surface2);
}
.settings-pill svg {
  opacity: 0.5;
  transition: opacity 0.15s, transform 0.3s;
  flex-shrink: 0;
}
.settings-pill:hover svg {
  opacity: 1;
  transform: rotate(60deg);
}

.stats-strip {
    display: flex;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
  }

  .stats-strip span { color: var(--text-mid); }
  .stats-strip b { color: var(--text); font-weight: 700; }

  /* ─── TOOLBAR ─────────────────────────────────────────────── */
  .toolbar {
    position: sticky;
    top: 64px;
    z-index: 90;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 400px;
    min-width: 200px;
  }

  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px 8px 36px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="search"]:focus { border-color: var(--accent); }
  input[type="search"]::placeholder { color: var(--text-dim); }

  .filter-group {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
  }

  .filter-btn {
    padding: 5px 14px;
    border-radius: 5px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .filter-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .filter-btn[data-filter="movie"].active { color: var(--movie-color); }
  .filter-btn[data-filter="series"].active { color: var(--series-color); }

  .sort-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text-mid);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    outline: none;
    cursor: pointer;
  }

  .toolbar-spacer { flex: 1; }

  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-mid);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-refresh:hover { border-color: var(--text-mid); color: var(--text); }
  .btn-refresh.spinning svg { animation: spin 0.8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── MAIN GRID ───────────────────────────────────────────── */
  main {
    padding: 24px 32px;
    position: relative;
    z-index: 1;
  }

  #count-bar {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  #count-bar b { color: var(--text-mid); }

  .media-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(var(--card-min-width, 200px), 1fr));
    gap: 14px;
  }

  /* ─── MEDIA CARD ──────────────────────────────────────────── */
  .media-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .media-card:hover {
    transform: translateY(-3px);
    border-color: #3a3a50;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }

  .media-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 30px var(--accent-dim);
  }

  .card-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .card-poster-placeholder {
    width: 100%;
    aspect-ratio: 2/3;
    background: var(--surface2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
  }

  .card-poster-placeholder svg { opacity: 0.3; }

  .card-type-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .card-type-badge.movie { background: rgba(96,165,250,0.2); color: var(--movie-color); border: 1px solid rgba(96,165,250,0.3); }
  .card-type-badge.series { background: rgba(167,139,250,0.2); color: var(--series-color); border: 1px solid rgba(167,139,250,0.3); }

  /* ── Watch badge ── */
  .card-watch-badge {
    position: absolute;
    bottom: 6px;
    left: 6px;
    background: rgba(0,0,0,0.78);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 4px;
    font-size: 9.5px;
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 5px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 3px;
    pointer-events: none;
    z-index: 2;
    white-space: nowrap;
  }
  .card-watch-badge.never { color: var(--accent); border-color: rgba(229,62,62,0.3); }
  .card-watch-badge.long  { color: var(--yellow, #f6c90e); border-color: rgba(246,201,14,0.3); }
  .card-watch-badge.recent{ color: #68d391; border-color: rgba(104,211,145,0.25); }

  /* ── View toggle ── */
  .view-toggle-group {
    display: flex;
    align-items: center;
    gap: 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px;
    flex-shrink: 0;
  }
  .view-toggle-btn {
    background: transparent;
    border: none;
    border-radius: 4px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px 7px;
    display: flex;
    align-items: center;
    transition: background 0.15s, color 0.15s;
    line-height: 1;
  }
  .view-toggle-btn.active { background: rgba(255,255,255,0.1); color: var(--text); }
  .view-toggle-btn:hover  { background: rgba(255,255,255,0.07); color: var(--text); }

  /* ── Card size slider ── */
  .slider-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .slider-wrap input[type="range"] {
    width: 72px;
    accent-color: var(--accent);
    cursor: pointer;
    height: 3px;
  }

  /* ── Watch filter toggle ── */
  .never-watched-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    user-select: none;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .never-watched-toggle:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .never-watched-toggle input { display: none; }
  .never-watched-toggle:has(input:checked) {
    background: rgba(229,62,62,0.12);
    border-color: rgba(229,62,62,0.4);
    color: var(--accent);
  }

  /* ── List view ── */
  #media-grid.list-view {
    display: flex !important;
    flex-direction: column !important;
    gap: 4px !important;
  }
  .list-row {
    display: grid;
    grid-template-columns: 40px 36px 1fr 80px 90px 100px 110px 110px 80px;
    align-items: center;
    gap: 0 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    min-width: 0;
  }
  .list-row:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.12); }
  .list-row.selected { background: rgba(229,62,62,0.08); border-color: rgba(229,62,62,0.35); }
  .list-row.list-header {
    background: transparent;
    border-color: transparent;
    cursor: default;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    padding: 2px 12px 4px;
  }
  .list-row.list-header:hover { background: transparent; border-color: transparent; }
  .list-thumb { width: 32px; height: 48px; object-fit: cover; border-radius: 3px; }
  .list-thumb-placeholder { width: 32px; height: 48px; background: rgba(255,255,255,0.05); border-radius: 3px; display:flex; align-items:center; justify-content:center; }
  .list-check { width: 16px; height: 16px; border: 1.5px solid rgba(255,255,255,0.2); border-radius: 3px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .list-row.selected .list-check { background: var(--accent); border-color: var(--accent); }
  .list-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
  .list-meta { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
  .list-watch { font-size: 11px; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
  .list-watch.never { color: var(--accent); }
  .list-watch.long  { color: var(--yellow, #f6c90e); }
  .list-watch.recent{ color: #68d391; }
  .list-open-btn {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-dim);
    font-size: 10px;
    padding: 3px 7px;
    cursor: pointer;
    white-space: nowrap;
  }
  .list-open-btn:hover { background: rgba(255,255,255,0.09); color: var(--text); }
  @media (max-width: 700px) {
    .list-row { grid-template-columns: 36px 28px 1fr 70px 80px; }
    .list-row > *:nth-child(n+6) { display: none; }
  }

  .card-torrent-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-torrent-badge.has-torrents {
    color: var(--green);
    border-color: rgba(34,197,94,0.3);
  }

  .card-info {
    padding: 10px 12px 12px;
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
  }

  .card-size { color: var(--yellow); font-weight: 700; }

  /* Select checkbox overlay */
  .card-check {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 22px;
    height: 22px;
    background: rgba(0,0,0,0.75);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, border-color 0.15s, background 0.15s;
    z-index: 5;
    pointer-events: auto;
    cursor: pointer;
  }

  .media-card:hover .card-check,
  .media-card.selected .card-check { opacity: 1; }
  .media-card.selected .card-check { border-color: var(--accent); background: var(--accent); }

  /* ─── BOTTOM ACTION BAR ───────────────────────────────────── */
  .action-bar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 200;
    white-space: nowrap;
  }

  .action-bar.visible { transform: translateX(-50%) translateY(0); }

  .action-bar-info {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-mid);
  }

  .action-bar-info b { color: var(--text); }
  .action-bar-info .size-info { color: var(--yellow); }

  .action-bar-divider { width: 1px; height: 28px; background: var(--border); }

  .btn-cancel {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancel:hover { color: var(--text); border-color: var(--text-mid); }

  .btn-delete {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .btn-delete:hover { background: #ff2222; box-shadow: 0 4px 24px rgba(255,68,68,0.6); }
  .btn-delete:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ─── MODAL ───────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%;
    max-width: 520px;
    overflow: hidden;
    transform: scale(0.95);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: scale(1); }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 4px;
  }

  .modal-title .danger { color: var(--accent); }

  .modal-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .modal-body { padding: 20px 24px; }

  .delete-list {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    max-height: 200px;
    overflow-y: auto;
    margin-bottom: 16px;
  }

  .delete-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .delete-item:last-child { border-bottom: none; }

  .delete-item-title {
    font-size: 13px;
    font-weight: 600;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .delete-item-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .torrent-info {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  .torrent-info-title {
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 10px;
  }

  .torrent-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
    color: var(--text-mid);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .torrent-row:last-child { border-bottom: none; }

  .torrent-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 11px;
  }

  .torrent-cat {
    color: var(--text-dim);
    font-size: 10px;
    flex-shrink: 0;
  }

  .summary-box {
    background: var(--accent-dim);
    border: 1px solid rgba(255,68,68,0.3);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
  }

  .summary-box b { color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
  }

  /* Progress state */
  .progress-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  .progress-icon { width: 16px; text-align: center; }
  .progress-icon.done { color: var(--green); }
  .progress-icon.error { color: var(--accent); }
  .progress-icon.pending { color: var(--text-dim); }
  .progress-icon.loading { animation: spin 0.8s linear infinite; display: inline-block; }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 100px;
    right: 24px;
    z-index: 400;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: toastIn 0.3s ease;
    max-width: 320px;
  }

  .toast.success { border-color: rgba(34,197,94,0.4); }
  .toast.error { border-color: rgba(255,68,68,0.4); color: var(--accent); }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* ── Scan progress widget ── */
  .scan-progress {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 150;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    display: none;
    flex-direction: column;
    gap: 6px;
    min-width: 200px;
    animation: scanIn 0.25s ease;
  }
  .scan-progress.visible { display: flex; }
  @keyframes scanIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .scan-progress-header {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-mid);
    font-weight: 600;
  }
  .scan-progress-header .scan-spinner {
    width: 12px; height: 12px;
    border: 1.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  .scan-progress-header .scan-done-icon {
    color: var(--green);
    flex-shrink: 0;
    font-size: 12px;
  }
  .scan-progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .scan-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }
  .scan-progress-detail {
    font-size: 10px;
    color: var(--text-dim);
  }
  .scan-progress-sub {
    font-size: 9px;
    color: var(--text-dim);
    opacity: 0.7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }

  /* Loading state */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    gap: 16px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }

  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    gap: 12px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .empty-state svg { opacity: 0.2; }


  /* ─── TORRENT PANEL ─────────────────────────────────────────────── */
  .torrent-panel-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .torrent-panel-overlay.open { opacity: 1; pointer-events: all; }

  .torrent-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: min(640px, 96vw);
    max-height: 85vh;
    display: flex; flex-direction: column;
    overflow: hidden;
    transform: translateY(12px); transition: transform 0.2s;
  }
  .torrent-panel-overlay.open .torrent-panel { transform: translateY(0); }

  .tp-header {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tp-poster {
    width: 48px; height: 72px; object-fit: cover; border-radius: 6px;
    background: var(--surface2); flex-shrink: 0;
  }
  .tp-poster-placeholder {
    width: 48px; height: 72px; border-radius: 6px;
    background: var(--surface2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 9px; text-align: center; padding: 4px;
  }
  .tp-title { font-size: 15px; font-weight: 800; flex: 1; }
  .tp-meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .tp-close {
    width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border);
    background: none; color: var(--text-dim); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s;
  }
  .tp-close:hover { border-color: var(--accent); color: var(--accent); }

  .tp-body {
    flex: 1; overflow-y: auto; padding: 14px 20px;
  }

  .tp-loading {
    display: flex; align-items: center; gap: 10px; padding: 24px 0;
    color: var(--text-dim); font-size: 13px; justify-content: center;
  }

  .torrent-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex; flex-direction: column; gap: 6px;
    transition: border-color 0.15s;
  }
  .torrent-item:hover { border-color: #3a3a50; }

  .torrent-item-top {
    display: flex; align-items: flex-start; gap: 10px;
  }
  .torrent-name {
    flex: 1; font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: var(--text-mid); word-break: break-all; line-height: 1.5;
  }
  .torrent-del-btn {
    flex-shrink: 0; background: none; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-dim); cursor: pointer;
    padding: 4px 8px; font-size: 11px; transition: all 0.15s;
    display: flex; align-items: center; gap: 4px;
  }
  .torrent-del-btn:hover { border-color: var(--accent); color: var(--accent); }
  .torrent-del-btn.deleting { opacity: 0.5; pointer-events: none; }
  .torrent-del-btn.deleted { border-color: var(--green); color: var(--green); pointer-events: none; }

  .torrent-item-meta {
    display: flex; flex-wrap: wrap; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
  }
  .t-size { color: var(--yellow); font-weight: 700; }
  .t-state { color: var(--text-dim); }
  .t-state.seeding { color: var(--green); }
  .t-state.downloading { color: #60a5fa; }
  .t-state.error { color: var(--accent); }
  .t-tracker {
    background: var(--surface2); border-radius: 4px;
    padding: 1px 6px; color: var(--text-mid);
  }

  .tp-empty {
    text-align: center; padding: 32px 0;
    color: var(--text-dim); font-size: 13px;
  }

  .tp-footer {
    border-top: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; gap: 10px; flex-shrink: 0;
  }
  .tp-btn-full-delete {
    flex: 1; padding: 10px 16px; border-radius: 10px;
    background: var(--accent); border: none; color: #fff;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.15s;
  }
  .tp-btn-full-delete:hover { background: #ff2222; }
  .tp-btn-full-delete:disabled { opacity: 0.4; pointer-events: none; }
  .tp-btn-cancel {
    padding: 10px 18px; border-radius: 10px;
    border: 1px solid var(--border); background: none;
    color: var(--text-mid); font-family: 'Inter', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .tp-btn-cancel:hover { border-color: var(--text-mid); color: var(--text); }

  /* poster cursor hint */
  .card-poster-wrap { cursor: pointer; position: relative; }


  /* ─── SEERR REQUESTS ────────────────────────────────────────────── */
  .seerr-section { margin-top: 14px; }
  .seerr-section-title {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .seerr-section-title::before {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .seerr-request-item {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px;
  }
  .seerr-status-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .seerr-status-dot.pending  { background: #f59e0b; box-shadow: 0 0 6px #f59e0b88; }
  .seerr-status-dot.approved { background: #3b82f6; box-shadow: 0 0 6px #3b82f688; }
  .seerr-status-dot.available{ background: var(--green); box-shadow: 0 0 6px #22c55e88; }
  .seerr-status-dot.processing{ background: #8b5cf6; box-shadow: 0 0 6px #8b5cf688; }
  .seerr-status-dot.declined { background: var(--accent); }

  .seerr-request-info { flex: 1; min-width: 0; }
  .seerr-request-status {
    font-size: 11px; font-weight: 700; text-transform: capitalize;
  }
  .seerr-request-meta {
    font-size: 10px; font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim); margin-top: 2px;
  }
  .seerr-del-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 6px; color: var(--text-dim); cursor: pointer;
    padding: 4px 8px; font-size: 10px; font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s; white-space: nowrap;
  }
  .seerr-del-btn:hover { border-color: var(--accent); color: var(--accent); }
  .seerr-del-btn.done { border-color: var(--green); color: var(--green); pointer-events: none; }
  .seerr-no-config {
    font-size: 10px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    padding: 6px 0; text-align: center;
  }

  .refresh-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: none;
    color: var(--text-dim); font-family: 'Inter', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.15s;
    white-space: nowrap;
  }
  .refresh-btn:hover { border-color: var(--text-mid); color: var(--text); }
  .refresh-btn.spinning svg { animation: spin 1s linear infinite; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3a50; }


  /* ─── Welcome modal ──────────────────────────────────────────── */
  .welcome-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
  }
  .welcome-box {
    background: var(--surface1); border: 1px solid var(--border);
    border-radius: 14px; padding: 36px 40px; max-width: 520px; width: 90%;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .welcome-logo {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  }
  .welcome-logo svg { flex-shrink: 0; }
  .welcome-logo-text { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .welcome-logo-text span { color: var(--accent); }
  .welcome-tagline {
    font-size: 13px; color: var(--text-mid); margin-bottom: 24px; line-height: 1.5;
  }
  .welcome-reqs {
    background: var(--surface2); border-radius: 8px;
    padding: 14px 16px; margin-bottom: 24px;
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
  }
  .welcome-reqs-title {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin-bottom: 10px;
  }
  .welcome-req-item {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 0; color: var(--text-mid);
  }
  .welcome-req-item .req-icon { font-size: 14px; width: 20px; text-align:center; }
  .welcome-req-item .req-label { flex: 1; }
  .welcome-req-item .req-note { color: var(--text-dim); font-size: 10px; }
  .welcome-btn {
    width: 100%; padding: 11px; border-radius: 8px;
    background: var(--accent); border: none; color: #fff;
    font-size: 13px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: opacity 0.15s;
  }
  .welcome-btn:hover { opacity: 0.85; }

  /* ─── MOBILE RESPONSIVE ──────────────────────────────────── */

  @media (max-width: 768px) {
    /* ── Header: compact single row ── */
    header {
      padding: 0 10px !important;
      height: 48px !important;
      gap: 6px !important;
    }
    .logo { gap: 6px; }
    .logo-text { font-size: 16px !important; }
    .logo-icon svg { width: 22px !important; height: 22px !important; }

    .header-right {
      gap: 6px !important;
      flex-shrink: 1 !important;
      min-width: 0 !important;
    }

    /* Hide stats on mobile */
    .stats-strip { display: none !important; }

    /* Services pill: dot only */
    .services-pill { padding: 4px 8px !important; font-size: 10px !important; }
    #pill-label { display: none !important; }

    /* Settings/logout: icon only */
    .settings-pill {
      padding: 6px !important;
      font-size: 10px !important;
      gap: 0 !important;
    }
    .settings-pill span { display: none !important; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 8px 10px !important;
      gap: 6px !important;
      flex-wrap: wrap !important;
      top: 48px !important;
    }
    .search-wrap {
      flex: 1 1 100% !important;
      max-width: none !important;
      min-width: 0 !important;
    }
    .filter-group { order: 1; }
    .filter-btn { padding: 5px 10px !important; font-size: 11px !important; }
    .sort-select { order: 2; font-size: 11px !important; padding: 6px 8px !important; min-width: 0; }
    .never-watched-toggle { order: 3; padding: 6px 8px !important; font-size: 10px !important; }
    .toolbar-spacer { display: none !important; }
    .view-toggle-group { order: 4; }
    .slider-wrap { order: 5; }
    .slider-wrap input[type="range"] { width: 50px; }
    .btn-refresh {
      order: 6;
      padding: 6px 8px !important;
    }
    .btn-refresh span { display: none !important; }

    /* ── Main grid ── */
    main { padding: 10px !important; }
    .media-grid {
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important;
      gap: 8px !important;
    }
    #count-bar { font-size: 10px; margin-bottom: 8px; }

    /* ── Action bar ── */
    .action-bar {
      bottom: 12px;
      padding: 10px 12px;
      gap: 8px;
      border-radius: 12px;
      max-width: calc(100vw - 24px);
    }
    .action-bar-info { font-size: 10px; }

    /* ── Torrent panel ── */
    .torrent-panel { width: 100vw !important; max-height: 90vh; border-radius: 12px 12px 0 0; }
    .torrent-panel-overlay { align-items: flex-end; }

    /* ── Scan progress ── */
    .scan-progress {
      bottom: 12px;
      left: 12px;
      right: 12px;
      min-width: auto;
    }

    /* ── Modal ── */
    .modal { max-width: calc(100vw - 32px); }

    /* ── Cards ── */
    .card-type-badge { font-size: 8px; padding: 2px 6px; }

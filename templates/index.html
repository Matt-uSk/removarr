<script>
// ─── State ────────────────────────────────────────────────────
// ─── 401 → login redirect ────────────────────────────────────
  const _origFetch = window.fetch.bind(window);
  window.fetch = async (...args) => {
    const r = await _origFetch(...args);
    if (r.status === 401) { window.location.href = '/login'; }
    return r;
  };

  let allMedia = [];
  let currentView = localStorage.getItem('removarr_view') || 'grid';
  let watchFilter = 'all';
  let tautulliEnabled = false;

  // ── Watch helpers ──────────────────────────────────────────────
  function watchAge(ts) {
    // ts is a Unix timestamp (seconds)
    if (!ts) return null;
    const diffMs = Date.now() - ts * 1000;
    const days = Math.floor(diffMs / 86400000);
    if (days < 30)  return { label: days + 'd', cls: 'recent', days };
    if (days < 365) return { label: Math.floor(days/30) + 'mo', cls: 'recent', days };
    return { label: Math.floor(days/365) + 'y', cls: days > 730 ? 'long' : 'recent', days };
  }
  const EYE_SVG = '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/></svg>';
  function watchBadgeHtml(m) {
    if (!tautulliEnabled) return '';
    if (!m.last_watched) return `<div class="card-watch-badge never">${EYE_SVG} —</div>`;
    const age = watchAge(m.last_watched);
    if (!age) return '';
    return `<div class="card-watch-badge ${age.cls}">${EYE_SVG} ${age.label}</div>`;
  }
  function watchLabelForList(m) {
    if (!tautulliEnabled) return { text: '—', cls: '' };
    if (!m.last_watched) return { text: t('watch_never'), cls: 'never' };
    const age = watchAge(m.last_watched);
    return { text: age ? age.label : '—', cls: age ? age.cls : '' };
  }
let selectedIds = new Set(); // "type-id" keys
let activeFilter = 'all';
let searchQuery = '';
let sortMode = 'title';
let currentPage = 1;
let noTorrentFilter = false;
let pageSize = (() => { try { return parseInt(localStorage.getItem('removarr_pagesize')) || 50; } catch(e) { return 50; } })();

// ─── Utils ────────────────────────────────────────────────────
function formatSize(bytes) {
  if (!bytes) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let i = 0;
  while (bytes >= 1024 && i < units.length - 1) { bytes /= 1024; i++; }
  return `${bytes.toFixed(i > 1 ? 1 : 0)} ${units[i]}`;
}

async function fetchTimeout(url, opts = {}, timeoutMs = 30000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs);
  try {
    const r = await fetch(url, { ...opts, signal: ctrl.signal });
    clearTimeout(timer);
    return r;
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('timeout');
    throw e;
  }
}

function mediaKey(m) { return `${m.type}-${m.id}`; }

function toast(msg, type = 'info', duration = 4000) {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), duration);
}

// ─── Status check ─────────────────────────────────────────────

// ─── i18n ──────────────────────────────────────────────────────
let _locale = {};

function t(key, vars = {}) {
  let str = _locale[key] ?? key;
  Object.entries(vars).forEach(([k, v]) => { str = str.replaceAll('{' + k + '}', v); });
  return str;
}

function applyI18n() {
  const lt = document.getElementById('loading-text');
  if (lt) lt.textContent = t('loading_media');
  const sl = document.getElementById('sel-label');
  if (sl) sl.textContent = t('action_selected_label');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const val = t(key);
    if (el.tagName === 'OPTION' || el.tagName === 'BUTTON' || el.tagName === 'SPAN' || el.tagName === 'DIV') {
      el.innerHTML = val;
    } else {
      el.textContent = val;
    }
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.getAttribute('data-i18n-placeholder'));
  });
  document.title = t('app_name');
}

async function loadLocale() {
  const saved = (() => { try { return localStorage.getItem('removarr_lang'); } catch(e) { return null; } })();
  const available = await fetch('/api/locales').then(r => r.json()).catch(() => []);
  const langs = available.map(l => l.lang);

  let lang = saved;
  if (!lang || lang === 'auto') {
    const nav = (navigator.language || navigator.userLanguage || 'en').split('-')[0].toLowerCase();
    lang = langs.includes(nav) ? nav : (langs.includes('en') ? 'en' : langs[0] || 'en');
  }
  if (!langs.includes(lang)) lang = langs[0] || 'en';

  try {
    _locale = await fetch('/api/locales/' + lang).then(r => r.json());
  } catch(e) {
    _locale = {};
  }
  applyI18n();
  // Update search placeholder after locale loaded
  const si = document.getElementById('search-input');
  if (si) si.placeholder = t('search_placeholder');
}

// ── Services pill state ──────────────────────────────────────
const _svcState = { radarr: null, sonarr: null, qbit: null, seerr: null, tautulli: null };

function _setSvc(id, ok, configured = true) {
  _svcState[id] = { ok, configured };
  const dot = document.getElementById('dot-' + id);
  if (dot) dot.className = 'svc-dot ' + (ok ? 'online' : 'offline');
  const row = document.getElementById('row-' + id);
  if (row) row.style.display = configured ? '' : 'none';
  _updatePill();
}

function _updatePill() {
  const all = Object.values(_svcState).filter(s => s && s.configured);
  const online = all.filter(s => s.ok).length;
  const hasError = all.some(s => !s.ok);
  const pill = document.getElementById('services-pill');
  const dot  = document.getElementById('pill-dot');
  const lbl  = document.getElementById('pill-label');
  if (dot) dot.className = 'pill-dot' + (hasError ? ' has-error' : '');
  if (lbl) lbl.textContent = `${online}/${all.length} services`;
}

function toggleServicesPill(e) {
  e.stopPropagation();
  document.getElementById('services-pill').classList.toggle('open');
}
function closeServicesPill() {
  const p = document.getElementById('services-pill');
  if (p) p.classList.remove('open');
}
document.addEventListener('click', closeServicesPill);
document.addEventListener('touchstart', (e) => {
  const pill = document.getElementById('services-pill');
  if (pill && !pill.contains(e.target)) closeServicesPill();
}, { passive: true });

async function checkStatus() {
  try {
    const r = await fetch('/api/status');
    const data = await r.json();
    _setSvc('radarr', !!data.radarr?.ok);
    _setSvc('sonarr', !!data.sonarr?.ok);
    _setSvc('qbit',   !!data.qbittorrent?.ok);
    // Tautulli
    const wasEnabled = tautulliEnabled;
    if (data.tautulli?.configured) {
      tautulliEnabled = true;
      _setSvc('tautulli', !!data.tautulli.ok);
      document.getElementById('watch-filter').style.display = '';
    } else {
      tautulliEnabled = false;
      _setSvc('tautulli', false, false);
      document.getElementById('watch-filter').style.display = 'none';
    }
    // Re-render grid if tautulli state changed (so badges appear without reload)
    if (wasEnabled !== tautulliEnabled && allMedia.length > 0) renderGrid();
  } catch(e) {}
  // Seerr (optional, separate endpoint)
  try {
    const sr = await fetch('/api/seerr/status');
    const sd = await sr.json();
    if (sd.configured) {
      _setSvc('seerr', !!sd.ok);
    } else {
      _setSvc('seerr', false, false);
    }
  } catch(e) {}
}

async function loadStats() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    document.getElementById('stat-movies').textContent = d.movie_count;
    document.getElementById('stat-series').textContent = d.series_count;
    document.getElementById('stat-torrents').textContent = d.torrent_count;
    document.getElementById('stat-size').textContent = formatSize(d.total_size);
  } catch(e) {}
}

// ─── Load media ───────────────────────────────────────────────
async function enrichMedia(mediaList) {
  const BATCH = 50;
  const total = mediaList.length;
  if (!total) return;

  // Show scan progress widget
  const widget = document.getElementById('scan-progress');
  const fill = document.getElementById('scan-fill');
  const label = document.getElementById('scan-label');
  const detail = document.getElementById('scan-detail');
  const sub = document.getElementById('scan-sub');
  const spinner = document.getElementById('scan-spinner');
  widget.classList.add('visible');
  label.textContent = t('scan_in_progress');
  detail.textContent = t('scan_what');
  sub.textContent = '';
  fill.style.width = '0%';

  let processed = 0;

  for (let i = 0; i < mediaList.length; i += BATCH) {
    const batch = mediaList.slice(i, i + BATCH).map(m => ({
      id: m.id, type: m.type, title: m.title, year: m.year,
      tmdb_id: m.tmdb_id, tvdb_id: m.tvdb_id, native_titles: m.native_titles || []
    }));
    try {
      const r = await fetch('/api/media/enrich', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(batch)
      });
      const enriched = await r.json();
      enriched.forEach(e => {
        const idx = allMedia.findIndex(m => m.id === e.id && m.type === e.type);
        if (idx !== -1) {
          allMedia[idx].poster = e.poster;
          allMedia[idx].torrent_count = e.torrent_count;
          allMedia[idx].torrent_hashes = e.torrent_hashes;
          allMedia[idx].tmdb_id = allMedia[idx].tmdb_id || e.tmdb_id;
          if (e.last_watched !== undefined) allMedia[idx].last_watched = e.last_watched;
          if (e.play_count   !== undefined) allMedia[idx].play_count   = e.play_count;
          // Update card in DOM
          const card = document.querySelector(`[data-key="${e.type}-${e.id}"]`);
          if (card && e.poster) {
            const existingImg = card.querySelector('.card-poster');
            const placeholder = card.querySelector('.card-poster-placeholder');
            const wrap = card.querySelector('.card-poster-wrap');
            if (existingImg) {
              existingImg.src = e.poster;
              existingImg.style.display = '';
              if (placeholder) placeholder.style.display = 'none';
            } else if (wrap) {
              const img = document.createElement('img');
              img.className = 'card-poster';
              img.alt = e.title || '';
              img.loading = 'lazy';
              img.src = e.poster;
              img.onerror = function() { this.style.display='none'; if(placeholder) placeholder.style.display='flex'; };
              wrap.insertBefore(img, wrap.firstChild);
              if (placeholder) placeholder.style.display = 'none';
            }
          }
          if (card) {
            const badge = card.querySelector('.card-torrent-badge');
            if (badge) {
              badge.className = 'card-torrent-badge' + (e.torrent_count > 0 ? ' has-torrents' : '');
              badge.innerHTML = e.torrent_count > 0 ? `⛓ ${e.torrent_count} ${e.torrent_count === 1 ? t('card_torrent_count', {n:''}).replace('{n}','').trim() : t('stats_torrents').toLowerCase()}` : `— 0`;
            }
          }
        }
      });
    } catch(e) { console.warn('Enrich batch failed', e); }

    // Update progress widget
    processed = Math.min(i + BATCH, total);
    const pct = Math.round((processed / total) * 100);
    fill.style.width = pct + '%';
    detail.textContent = `${processed} / ${total}`;
    // Show last batch title
    const lastTitle = batch[batch.length - 1]?.title || '';
    sub.textContent = lastTitle;

    setSessionCache(allMedia, true); // mark enriched after each batch — survives page navigation
  }

  // Scan complete
  setSessionCache(allMedia, true);

  // Re-render grid with full Tautulli data + updated stats
  renderGrid();
  updateStatsFromMedia(allMedia);

  // Show done state briefly then hide
  spinner.style.display = 'none';
  label.innerHTML = `<span class="scan-done-icon">✓</span> ${t('scan_complete')}`;
  fill.style.width = '100%';
  detail.textContent = `${total} ${t('scan_items_scanned')}`;
  sub.textContent = '';
  setTimeout(() => {
    widget.classList.remove('visible');
    spinner.style.display = '';
  }, 2500);
}

// ─── Session cache (avoid re-fetching on page revisit) ────────
const MEDIA_CACHE_TTL = 15 * 60 * 1000; // 15 minutes

function getSessionCache() {
  try {
    const raw = sessionStorage.getItem('removarr_media');
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    const { ts, data, enriched } = parsed;
    if (!Array.isArray(data)) { sessionStorage.removeItem('removarr_media'); return null; }
    if (Date.now() - ts < MEDIA_CACHE_TTL) return { data, enriched: !!enriched };
    sessionStorage.removeItem('removarr_media');
  } catch(e) { try { sessionStorage.removeItem('removarr_media'); } catch(_) {} }
  return null;
}
function setSessionCache(data, enriched = false) {
  try { sessionStorage.setItem('removarr_media', JSON.stringify({ ts: Date.now(), data, enriched })); } catch(e) {}
}
function clearSessionCache() {
  try { sessionStorage.removeItem('removarr_media'); } catch(e) {}
}
function updateStatsFromMedia(media) {
  const movies   = media.filter(m => m.type === 'movie').length;
  const series   = media.filter(m => m.type === 'series').length;
  const torrents = media.reduce((s, m) => s + (m.torrent_count || 0), 0);
  const size     = media.reduce((s, m) => s + (m.size || 0), 0);
  const el = id => document.getElementById(id);
  if (el('stat-movies'))   el('stat-movies').textContent   = movies;
  if (el('stat-series'))   el('stat-series').textContent   = series;
  if (el('stat-torrents')) el('stat-torrents').textContent = torrents;
  if (el('stat-size'))     el('stat-size').textContent     = formatSize(size);
}

async function loadMedia(forceRefresh = false) {
  const grid = document.getElementById('media-grid');

  if (!forceRefresh) {
    const cached = getSessionCache();
    if (cached) {
      allMedia = cached.data;
      renderGrid();
      updateStatsFromMedia(allMedia);
      // Only re-enrich if the previous scan didn't complete
      if (!cached.enriched) enrichMedia(allMedia);
      return;
    }
  }

  grid.innerHTML = `<div class="loading-state" style="grid-column:1/-1">
    <div class="loading-spinner"></div><span id="loading-text"></span>
  </div>`;
  const lt2 = document.getElementById('loading-text');
  if (lt2) lt2.textContent = t('loading_media');

  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 90000);
    const r = await fetch('/api/media', { signal: controller.signal });
    clearTimeout(timeout);
    allMedia = await r.json();
    setSessionCache(allMedia);
    renderGrid();
    enrichMedia(allMedia);  // async TMDB enrichment in background — saves posters to disk
  } catch(e) {
    if (e && e.status === 401) { window.location.href = '/login'; return; }
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
      </svg>
      <span>${t('error_load_media')}</span>
    </div>`;
    toast(t('error_api_connection'), 'error');
  }
}

async function loadAll() {
  const btn = document.getElementById('btn-refresh');
  if (btn) btn.classList.add('spinning');
  try {
    // On fresh page load (not back/forward nav), clear cache to get fresh data
    const navType = performance?.getEntriesByType?.('navigation')?.[0]?.type;
    if (navType === 'reload' || navType === 'navigate') {
      clearSessionCache();
    }
    await Promise.all([checkStatus(), loadStats(), loadMedia()]);
  } catch(e) {
    console.error('loadAll error:', e);
  } finally {
    if (btn) btn.classList.remove('spinning');
  }
}

// ─── Render grid ──────────────────────────────────────────────
function getFiltered() {
  let list = [...allMedia];
  if (activeFilter !== 'all') list = list.filter(m => m.type === activeFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(m => m.title.toLowerCase().includes(q) || String(m.year).includes(q));
  }
  // Watch filter
  if (watchFilter !== 'all') {
    const now = Date.now();
    list = list.filter(m => {
      if (watchFilter === 'never') return !m.last_watched;
      const days = m.last_watched ? (now - m.last_watched * 1000) / 86400000 : Infinity;
      if (watchFilter === '6m')  return days > 180;
      if (watchFilter === '1y')  return days > 365;
      if (watchFilter === '2y')  return days > 730;
      return true;
    });
  }
  // No-torrent filter: hide media with no associated torrent
  if (noTorrentFilter) {
    list = list.filter(m => m.torrent_count && m.torrent_count > 0);
  }
  list.sort((a, b) => {
    switch(sortMode) {
      case 'title': return a.title.localeCompare(b.title);
      case 'title-desc': return b.title.localeCompare(a.title);
      case 'size-desc': return b.size - a.size;
      case 'size-asc': return a.size - b.size;
      case 'year-desc': return (b.year||0) - (a.year||0);
      case 'year-asc': return (a.year||0) - (b.year||0);
      case 'torrents-desc': return (b.torrent_count||0) - (a.torrent_count||0);
      case 'torrents-asc': return (a.torrent_count||0) - (b.torrent_count||0);
      case 'watched-asc':  return (a.last_watched||0) - (b.last_watched||0);   // oldest first
      case 'watched-desc': return (b.last_watched||0) - (a.last_watched||0);   // newest first
      case 'added-desc':   return (b.added||'').localeCompare(a.added||'');     // newest first
      case 'added-asc':    return (a.added||'').localeCompare(b.added||'');     // oldest first
    }
    return 0;
  });
  return list;
}

function setWatchFilter(val) {
  watchFilter = val;
  currentPage = 1;
  renderGrid();
}

function toggleNoTorrentFilter(checked) {
  noTorrentFilter = checked;
  currentPage = 1;
  renderGrid();
}

function renderPagination(total) {
  const bar = document.getElementById('pagination-bar');
  if (!bar) return;
  const totalPages = Math.ceil(total / pageSize);
  if (totalPages <= 1 && total <= pageSize) {
    bar.innerHTML = `
      <div class="page-size-wrap">
        <span data-i18n="pagination_per_page"></span>
        <select class="page-size-select" onchange="changePageSize(+this.value)">
          ${[25,50,100,200].map(n => `<option value="${n}" ${n===pageSize?'selected':''}>${n}</option>`).join('')}
        </select>
      </div>`;
    applyI18n();
    return;
  }

  // Compute visible page buttons: always show first, last, current ±2
  const pages = new Set([1, totalPages]);
  for (let p = Math.max(1, currentPage-2); p <= Math.min(totalPages, currentPage+2); p++) pages.add(p);
  const sorted = [...pages].sort((a,b) => a-b);

  let btns = '';
  let prev = 0;
  sorted.forEach(p => {
    if (prev && p - prev > 1) btns += `<span class="page-btn" style="pointer-events:none;border:none;color:var(--text-dim)">…</span>`;
    btns += `<button class="page-btn${p===currentPage?' active':''}" onclick="goToPage(${p})">${p}</button>`;
    prev = p;
  });

  const start = (currentPage-1)*pageSize + 1;
  const end   = Math.min(currentPage*pageSize, total);

  bar.innerHTML = `
    <span class="page-info">${start}–${end} / ${total}</span>
    <button class="page-btn prev-next" onclick="goToPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>
    ${btns}
    <button class="page-btn prev-next" onclick="goToPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>
    <div class="page-size-wrap">
      <span data-i18n="pagination_per_page"></span>
      <select class="page-size-select" onchange="changePageSize(+this.value)">
        ${[25,50,100,200].map(n => `<option value="${n}" ${n===pageSize?'selected':''}>${n}</option>`).join('')}
      </select>
    </div>`;
  applyI18n();
}

function goToPage(p) {
  const list = getFiltered();
  const totalPages = Math.ceil(list.length / pageSize);
  currentPage = Math.max(1, Math.min(p, totalPages));
  renderGrid();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function changePageSize(n) {
  pageSize = n;
  try { localStorage.setItem('removarr_pagesize', n); } catch(e) {}
  currentPage = 1;
  renderGrid();
}

function renderGrid() {
  try {
  const grid = document.getElementById('media-grid');
  const list = getFiltered();
  const countBar = document.getElementById('count-bar');
  countBar.innerHTML = list.length !== 1 ? t('count_media_plural', {n: list.length}) : t('count_media', {n: list.length});
  if (currentView === 'list') { renderListView(list); return; }
  grid.className = 'media-grid'; // ensure list-view class is removed

  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/>
      </svg>
      <span>${t("no_results")}</span>
    </div>`;
    document.getElementById('pagination-bar').innerHTML = '';
    return;
  }

  // Clamp currentPage
  const totalPages = Math.ceil(list.length / pageSize);
  if (currentPage > totalPages) currentPage = totalPages;

  const pageList = list.slice((currentPage-1)*pageSize, currentPage*pageSize);

  renderPagination(list.length);

  grid.innerHTML = '';
  pageList.forEach((m, i) => {
    const key = mediaKey(m);
    const isSelected = selectedIds.has(key);
    const card = document.createElement('div');
    card.className = `media-card${isSelected ? ' selected' : ''}`;
    card.style.animationDelay = `${Math.min(i * 20, 300)}ms`;
    card.dataset.key = key;

    const posterInner = m.poster
      ? `<img class="card-poster" src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="card-poster-placeholder" style="display:none">
           <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
             <rect x="3" y="3" width="18" height="18" rx="2"/>
           </svg>${m.title}
         </div>`
      : `<div class="card-poster-placeholder">
           <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
             <rect x="3" y="3" width="18" height="18" rx="2"/>
           </svg>${m.title}
         </div>`;
    const watchBadge = watchBadgeHtml(m);
    const torrentBadge = m.torrent_count > 0
      ? `<div class="card-torrent-badge has-torrents">⛓ ${m.torrent_count}</div>`
      : `<div class="card-torrent-badge">— 0</div>`;
    const checkHtml = `<div class="card-check" data-check-key="${key}"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>`;
    const posterHtml = `<div class="card-poster-wrap">${posterInner}${watchBadge}${checkHtml}</div>`;

    const extraMeta = m.type === 'series' && m.seasons
      ? m.seasons > 1 ? t('card_seasons_plural', {n: m.seasons}) : t('card_seasons', {n: m.seasons})
      : (m.year || '');

    card.innerHTML = `
      ${posterHtml}
      <div class="card-type-badge ${m.type}">${m.type === 'movie' ? t('card_type_movie') : t('card_type_series')}</div>
      ${torrentBadge}
      <div class="card-info">
        <div class="card-title" title="${m.title}">${m.title}</div>
        <div class="card-meta">
          <span>${extraMeta}</span>
          <span class="card-size">${formatSize(m.size)}</span>
        </div>
      </div>`;

    // Checkbox click → toggle selection only
    card.querySelector('.card-check').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleSelect(key);
    });
    // Card click → open torrent panel
    card.addEventListener('click', () => openTorrentPanel(null, key));
    grid.appendChild(card);
  });
  } catch(err) { console.error('renderGrid error:', err); }
}

// ─── View mode ───────────────────────────────────────────────
function setView(v) {
  currentView = v;
  try { localStorage.setItem('removarr_view', v); } catch(e) {}
  // Update toggle button states
  const btnGrid = document.getElementById('btn-view-grid');
  const btnList = document.getElementById('btn-view-list');
  if (btnGrid) { btnGrid.classList.toggle('active', v === 'grid'); }
  if (btnList) { btnList.classList.toggle('active', v === 'list'); }
  // Reset grid class immediately so CSS grid applies correctly
  const grid = document.getElementById('media-grid');
  if (grid) grid.className = v === 'list' ? 'media-grid list-view' : 'media-grid';
  // Show/hide slider
  const sliderWrap = document.getElementById('slider-wrap');
  if (sliderWrap) sliderWrap.style.display = v === 'grid' ? '' : 'none';
  // Re-apply card size on grid switch
  if (v === 'grid') {
    try {
      const saved = localStorage.getItem('removarr_cardsize');
      if (saved) document.documentElement.style.setProperty('--card-min-width', saved + 'px');
    } catch(e) {}
  }
  renderGrid();
}

function renderListView(list) {
  const grid = document.getElementById('media-grid');
  grid.className = 'media-grid list-view';

  const totalPages = Math.ceil(list.length / pageSize);
  if (currentPage > totalPages) currentPage = totalPages || 1;
  const pageList = list.slice((currentPage-1)*pageSize, currentPage*pageSize);
  renderPagination(list.length);

  const watchCol = tautulliEnabled
    ? `<span data-i18n="list_col_watched"></span>`
    : '';
  const playsCol = tautulliEnabled
    ? `<span data-i18n="list_col_plays"></span>`
    : '';

  const header = document.createElement('div');
  header.className = 'list-row list-header';
  header.innerHTML = `
    <span></span><span></span>
    <span data-i18n="list_col_title"></span>
    <span data-i18n="list_col_type"></span>
    <span data-i18n="list_col_year"></span>
    <span data-i18n="list_col_size"></span>
    <span data-i18n="list_col_torrents"></span>
    ${watchCol}
    ${playsCol}
  `;
  grid.innerHTML = '';
  grid.appendChild(header);

  pageList.forEach(m => {
    const key = mediaKey(m);
    const isSelected = selectedIds.has(key);
    const row = document.createElement('div');
    row.className = `list-row${isSelected ? ' selected' : ''}`;
    row.dataset.key = key;

    const thumb = m.poster
      ? `<img class="list-thumb" src="${m.poster}" alt="${m.title}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="list-thumb-placeholder"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/></svg></div>`;

    const wl = watchLabelForList(m);
    const watchCell = tautulliEnabled ? `<span class="list-watch ${wl.cls}">${wl.text}</span>` : '';
    const playsCell = tautulliEnabled ? `<span class="list-meta">${m.play_count || 0}×</span>` : '';

    row.innerHTML = `
      <div class="list-check">
        ${isSelected ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
      </div>
      ${thumb}
      <span class="list-title" title="${m.title}">${m.title}</span>
      <span class="list-meta">${m.type === 'movie' ? t('card_type_movie') : t('card_type_series')}</span>
      <span class="list-meta">${m.year || '—'}</span>
      <span class="list-meta">${formatSize(m.size)}</span>
      <span class="list-meta">${m.torrent_count || 0}</span>
      ${watchCell}
      ${playsCell}
    `;

    row.addEventListener('click', (e) => {
      if (e.target.closest('.list-open-btn')) return;
      toggleSelect(key);
    });
    grid.appendChild(row);
  });
  applyI18n();
}

// ─── Selection ────────────────────────────────────────────────
function toggleSelect(key) {
  if (selectedIds.has(key)) selectedIds.delete(key);
  else selectedIds.add(key);
  updateSelectionUI();
  if (currentView === 'list') {
    const row = document.querySelector(`.list-row[data-key="${key}"]`);
    if (row) {
      row.classList.toggle('selected', selectedIds.has(key));
      const chk = row.querySelector('.list-check');
      if (chk) chk.innerHTML = selectedIds.has(key)
        ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
        : '';
    }
  } else {
    const card = document.querySelector(`.media-card[data-key="${key}"]`);
    if (card) card.classList.toggle('selected', selectedIds.has(key));
  }
}

function clearSelection() {
  selectedIds.clear();
  updateSelectionUI();
  document.querySelectorAll('.media-card.selected').forEach(c => c.classList.remove('selected'));
}

function updateSelectionUI() {
  const bar = document.getElementById('action-bar');
  const count = selectedIds.size;
  if (count > 0) {
    bar.classList.add('visible');
    document.getElementById('sel-count').textContent = count;
    const totalSize = [...selectedIds].reduce((acc, key) => {
      const m = allMedia.find(x => mediaKey(x) === key);
      return acc + (m?.size || 0);
    }, 0);
    document.getElementById('sel-size').textContent = formatSize(totalSize);
  } else {
    bar.classList.remove('visible');
  }
}

// ─── Delete Modal ─────────────────────────────────────────────
let pendingTorrents = {}; // key → [{hash, name, ...}]

async function openDeleteModal() {
  const items = [...selectedIds].map(key => allMedia.find(m => mediaKey(m) === key)).filter(Boolean);
  if (!items.length) return;

  const modal = document.getElementById('modal-overlay');
  const body = document.getElementById('modal-body');
  const subtitle = document.getElementById('modal-subtitle');
  const confirmBtn = document.getElementById('modal-confirm-btn');

  subtitle.textContent = t('modal_subtitle', {n: items.length, size: formatSize(items.reduce((a,m)=>a+m.size,0))});

  // Show item list
  body.innerHTML = `
    <div class="delete-list">
      ${items.map(m => `
        <div class="delete-item">
          <span class="card-type-badge ${m.type}" style="position:static;flex-shrink:0">${m.type==='movie'?t('card_type_movie'):t('card_type_series')}</span>
          <span class="delete-item-title">${m.title}${m.year?` (${m.year})`:''}</span>
          <span class="delete-item-meta">${formatSize(m.size)}</span>
        </div>`).join('')}
    </div>
    <div class="torrent-info" id="torrent-preview">
      <div class="torrent-info-title">${t('modal_loading_torrents_detail')}</div>
    </div>
    <div class="summary-box">
      <b>1.</b> ${t('delete_explain_1')}<br>
      <b>2.</b> ${t('delete_explain_2')}
    </div>`;

  modal.classList.add('open');
  confirmBtn.disabled = true;

  // Load torrent preview
  pendingTorrents = {};
  let allTorrentCount = 0;

  await Promise.all(items.map(async m => {
    try {
      const r = await fetch('/api/torrents/preview', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title: m.title, year: m.year, type: m.type, tmdb_id: m.tmdb_id, tvdb_id: m.tvdb_id, native_titles: m.native_titles || [], torrent_hashes: m.torrent_hashes || []})
      });
      const torrents = await r.json();
      pendingTorrents[mediaKey(m)] = torrents;
      allTorrentCount += torrents.length;
    } catch(e) { pendingTorrents[mediaKey(m)] = []; }
  }));

  const allTorrents = Object.values(pendingTorrents).flat();
  const preview = document.getElementById('torrent-preview');

  if (allTorrents.length === 0) {
    preview.innerHTML = `<div class="torrent-info-title">⚠ ${t("torrent_panel_no_torrents")}</div>
      <div style="color:var(--text-dim);font-size:11px;margin-top:4px">${t('modal_no_torrents_hint')}</div>`;
  } else {
    preview.innerHTML = `<div class="torrent-info-title">${t('modal_torrents_to_delete', {n: allTorrents.length})}</div>
      ${allTorrents.slice(0, 8).map(tor => `
        <div class="torrent-row">
          <span class="torrent-name">${tor.name}</span>
          <span class="torrent-cat">${tor.category || tor.tags || '—'}</span>
          <span style="color:var(--yellow);flex-shrink:0">${formatSize(tor.size)}</span>
        </div>`).join('')}
      ${allTorrents.length > 8 ? `<div style="color:var(--text-dim);font-size:10px;padding-top:6px">${t('modal_torrents_more', {n: allTorrents.length-8})}</div>` : ''}`;
  }

  confirmBtn.disabled = false;
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

async function confirmDelete() {
  const confirmBtn = document.getElementById('modal-confirm-btn');
  const body = document.getElementById('modal-body');
  const actions = document.getElementById('modal-actions');

  confirmBtn.disabled = true;
  actions.style.display = 'none';

  const items = [...selectedIds].map(key => allMedia.find(m => mediaKey(m) === key)).filter(Boolean);

  // Show progress UI
  body.innerHTML = `
    <div style="padding: 8px 0">
      ${items.map(m => `
        <div class="progress-item" id="prog-${mediaKey(m)}">
          <span class="progress-icon loading" id="icon-${mediaKey(m)}">↻</span>
          <span style="flex:1;font-size:12px">${m.title}</span>
          <span id="status-${mediaKey(m)}" style="color:var(--text-dim);font-size:10px">${t('progress_pending')}</span>
        </div>`).join('')}
    </div>`;

  let successCount = 0;
  let errorCount = 0;

  for (const m of items) {
    const key = mediaKey(m);
    const icon = document.getElementById(`icon-${key}`);
    const statusEl = document.getElementById(`status-${key}`);
    const torrentHashes = (pendingTorrents[key] || []).map(tor => tor.hash);

    try {
      const r = await fetchTimeout('/api/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id: m.id, type: m.type, torrent_hashes: torrentHashes, delete_torrent_files: true})
      }, 60000);
      const result = await r.json();

      if (result.success) {
        icon.className = 'progress-icon done';
        icon.textContent = '✓';
        statusEl.textContent = t('toast_deleted', {n: torrentHashes.length, s: torrentHashes.length!==1?'s':''});
        statusEl.style.color = 'var(--green)';
        successCount++;
        allMedia = allMedia.filter(x => mediaKey(x) !== key);
        selectedIds.delete(key);
      } else {
        throw new Error(result.errors?.join(', ') || t('toast_error'));
      }
    } catch(e) {
      icon.className = 'progress-icon error';
      icon.textContent = '✗';
      statusEl.textContent = e.message === 'timeout' ? t('toast_timeout') : (e.message || t('toast_error'));
      statusEl.style.color = 'var(--accent)';
      errorCount++;
    }
  }

  // Done
  actions.style.display = 'flex';
  actions.innerHTML = `<button class="btn-cancel" onclick="closeModal();finishDelete()">${t('modal_btn_close')}</button>`;

  if (successCount > 0) toast(successCount > 1 ? t('toast_bulk_deleted_plural', {n: successCount}) : t('toast_bulk_deleted', {n: successCount}), 'success');
  if (errorCount > 0) toast(`${errorCount} ${t('toast_error')}`, 'error');
}

function finishDelete() {
  updateSelectionUI();
  renderGrid();
  loadStats();
  clearSessionCache(); // force fresh load next time
}

// ─── Torrent Panel ───────────────────────────────────────────────────────────

let tpMedia = null;   // current media shown in panel
let tpTorrents = [];  // current torrent list

function stateLabel(state) {
  const s = (state || '').toLowerCase();
  if (s.includes('upload') || s === 'seeding') return { text: 'Seeding', cls: 'seeding' };
  if (s.includes('download')) return { text: 'DL', cls: 'downloading' };
  if (s.includes('stall') || s.includes('error') || s.includes('miss')) return { text: state, cls: 'error' };
  return { text: state, cls: '' };
}

function openTorrentPanel(event, key) {
  if (event) event.stopPropagation();
  const media = allMedia.find(m => `${m.type}-${m.id}` === key);
  if (!media) return;
  tpMedia = media;
  tpTorrents = [];

  // Header
  document.getElementById('tp-title').textContent = media.title;
  document.getElementById('tp-meta').textContent =
    `${media.type === 'movie' ? '🎬' : '📺'} ${media.year || ''}  ·  ${formatSize(media.size)}`;

  // Poster
  const posterWrap = document.getElementById('tp-poster-wrap');
  if (media.poster) {
    posterWrap.innerHTML = `<img class="tp-poster" src="${media.poster}" alt="${media.title}">`;
  } else {
    posterWrap.innerHTML = `<div class="tp-poster-placeholder">${media.title}</div>`;
  }

  // Body loading
  document.getElementById('tp-body').innerHTML =
    `<div class="tp-loading"><div class="loading-spinner"></div> ${t('torrent_panel_loading_torrents')}</div>`;
  document.getElementById('tp-full-delete-btn').disabled = true;

  // Open
  document.getElementById('tp-overlay').classList.add('open');

  // Fetch torrents
  fetch('/api/torrents/preview', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      title: media.title,
      year: media.year,
      type: media.type,
      tmdb_id: media.tmdb_id,
      tvdb_id: media.tvdb_id,
      native_titles: media.native_titles || [],
      torrent_hashes: media.torrent_hashes
    })
  })
  .then(r => r.json())
  .then(renderTorrentList)
  .catch(() => {
    document.getElementById('tp-body').innerHTML =
      `<div class="tp-empty">${t('torrent_panel_load_error')}</div>`;
  });
}

function renderTorrentList(torrents) {
  tpTorrents = torrents;
  const body = document.getElementById('tp-body');
  const btn = document.getElementById('tp-full-delete-btn');

  if (!torrents.length) {
    body.innerHTML = `<div class="tp-empty">${t("torrent_panel_no_torrents")}</div>`;
    btn.disabled = false;  // can still delete media from Sonarr/Radarr
    btn.textContent = t('torrent_panel_delete_radarr');
    return;
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
    <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
  </svg> ${torrents.length === 1 ? t('torrent_panel_delete_media', {n: torrents.length}) : t('torrent_panel_delete_media_plural', {n: torrents.length})}`;

  body.innerHTML = torrents.map(tor => {
    const sl = stateLabel(tor.state);
    const trackerBadges = (tor.trackers || []).map(tr =>
      `<span class="t-tracker">${tr}</span>`).join('');
    return `<div class="torrent-item" id="titem-${tor.hash}">
      <div class="torrent-item-top">
        <span class="torrent-name">${tor.name}</span>
        <button class="torrent-del-btn" onclick="deleteSingleTorrent('${tor.hash}')">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          </svg> ${t('torrent_panel_remove')}
        </button>
      </div>
      <div class="torrent-item-meta">
        <span class="t-size">${formatSize(tor.size)}</span>
        <span class="t-state ${sl.cls}">${sl.text}</span>
        ${trackerBadges}
      </div>
    </div>`;
  }).join('');

  // Fetch Seerr requests in parallel
  const tmdbId = tpMedia.tmdb_id || tpMedia.tvdb_id;
  if (tmdbId) {
    const seerrSection = document.createElement('div');
    seerrSection.className = 'seerr-section';
    seerrSection.id = 'seerr-section';
    seerrSection.innerHTML = `
      <div class="seerr-section-title">${t('torrent_panel_seerr_title')}</div>
      <div id="seerr-requests-body" style="font-size:10px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;padding:4px 0">
        <div class="loading-spinner" style="display:inline-block;width:10px;height:10px;margin-right:6px"></div> ${t('torrent_panel_loading_seerr')}
      </div>`;
    body.appendChild(seerrSection);
    loadSeerrRequests(tmdbId, tpMedia.type);
  }
}

async function deleteSingleTorrent(hash) {
  const btn = document.querySelector(`#titem-${hash} .torrent-del-btn`);
  if (btn) { btn.classList.add('deleting'); btn.textContent = '...'; }

  try {
    const r = await fetchTimeout('/api/torrents/delete-one', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ hash, delete_files: false })
    }, 30000);
    const res = await r.json();
    if (res.success) {
      const item = document.getElementById(`titem-${hash}`);
      if (item) {
        item.style.opacity = '0.4';
        item.style.pointerEvents = 'none';
        if (btn) { btn.classList.remove('deleting'); btn.classList.add('deleted'); btn.textContent = t('torrent_panel_removed'); }
      }
      tpTorrents = tpTorrents.filter(tor => tor.hash !== hash);
      // Update the full delete button label
      const remaining = tpTorrents.length;
      const delBtn = document.getElementById('tp-full-delete-btn');
      if (delBtn && remaining > 0) {
        delBtn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg> ${remaining === 1 ? t('torrent_panel_delete_media', {n: remaining}) : t('torrent_panel_delete_media_plural', {n: remaining})}`;
      }
      // Update card badge
      const card = document.querySelector(`[data-key="${tpMedia.type}-${tpMedia.id}"]`);
      if (card) {
        const badge = card.querySelector('.card-torrent-badge');
        if (badge) {
          badge.className = 'card-torrent-badge' + (remaining > 0 ? ' has-torrents' : '');
          badge.innerHTML = remaining > 0 ? `⛓ ${remaining}` : `— 0`;
        }
      }
      toast(t('toast_torrent_removed'), 'success');
    } else {
      if (btn) { btn.classList.remove('deleting'); btn.textContent = t('torrent_panel_remove'); }
      toast(t('toast_torrent_remove_fail'), 'error');
    }
  } catch(e) {
    if (btn) { btn.classList.remove('deleting'); btn.textContent = t('torrent_panel_remove'); }
    const msg = e.message === 'timeout' ? t('toast_timeout') : t('toast_network_error');
    toast(msg, 'error');
  }
}

async function fullDeleteFromPanel() {
  const btn = document.getElementById('tp-full-delete-btn');
  btn.disabled = true;
  btn.innerHTML = `<div class="loading-spinner"></div> ${t('torrent_panel_deleting')}`;

  const hashes = tpTorrents.map(tor => tor.hash);

  console.log('[Removarr] fullDeleteFromPanel:', {
    id: tpMedia?.id, type: tpMedia?.type, title: tpMedia?.title,
    hashes_count: hashes.length, hashes: hashes.slice(0, 3)
  });

  try {
    const r = await fetchTimeout('/api/delete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        id: tpMedia.id,
        type: tpMedia.type,
        torrent_hashes: hashes,
        delete_torrent_files: true
      })
    }, 60000);
    console.log('[Removarr] delete response status:', r.status);
    const res = await r.json();
    console.log('[Removarr] delete response:', res);
    if (res.success) {
      // Auto-delete Seerr requests if any
      const seerrItems = document.querySelectorAll('#seerr-section .seerr-request-item');
      seerrItems.forEach(item => {
        const reqId = item.id.replace('sreq-', '');
        if (reqId) {
          fetch(`/api/seerr/request/${reqId}/delete`, { method: 'POST' }).catch(() => {});
        }
      });
      toast(`${tpMedia.title} — ${t('toast_media_deleted')}`, 'success');
      closeTorrentPanel();
      // Remove card from DOM
      const card = document.querySelector(`[data-key="${tpMedia.type}-${tpMedia.id}"]`);
      if (card) card.remove();
      allMedia = allMedia.filter(m => !(m.id === tpMedia.id && m.type === tpMedia.type));
      clearSessionCache(); // force fresh load next time
    } else {
      btn.disabled = false;
      btn.innerHTML = t('torrent_panel_error');
      toast(t('toast_error'), 'error');
    }
  } catch(e) {
    console.error('[Removarr] fullDeleteFromPanel error:', e, e.message, e.stack);
    btn.disabled = false;
    btn.innerHTML = t('torrent_panel_error');
    const msg = e.message === 'timeout' ? t('toast_timeout') : `${t('toast_network_error')} (${e.message})`;
    toast(msg, 'error');
  }
}

async function loadSeerrRequests(tmdbId, mediaType) {
  const body = document.getElementById('seerr-requests-body');
  if (!body) return;
  try {
    const r = await fetch('/api/seerr/requests', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ tmdb_id: tmdbId, type: mediaType })
    });
    const requests = await r.json();
    if (!requests.length) {
      body.innerHTML = `<span style="color:var(--text-dim)">${t("torrent_panel_no_requests")}</span>`;
      return;
    }
    body.innerHTML = requests.map(req => {
      const statusColors = {
        pending: '#f59e0b', approved: '#3b82f6',
        available: 'var(--green)', processing: '#8b5cf6', declined: 'var(--accent)'
      };
      const color = statusColors[req.status] || 'var(--text-dim)';
      const date = req.created_at ? new Date(req.created_at).toLocaleDateString(navigator.language || 'fr') : '';
      const seasons = req.seasons?.length ? ` · S${req.seasons.map(s=>String(s).padStart(2,'0')).join(', S')}` : '';
      return `<div class="seerr-request-item" id="sreq-${req.id}">
        <div class="seerr-status-dot ${req.status}"></div>
        <div class="seerr-request-info">
          <div class="seerr-request-status" style="color:${color}">${req.status}</div>
          <div class="seerr-request-meta">${req.requested_by}${seasons}${date ? ' · '+date : ''}</div>
        </div>
        <button class="seerr-del-btn" onclick="deleteSeerrRequest(${req.id})">
          ${t('torrent_panel_delete_request')}
        </button>
      </div>`;
    }).join('');
  } catch(e) {
    if (body) body.innerHTML = `<span style="color:var(--text-dim)">${t('torrent_panel_no_seerr_config')}</span>`;
  }
}

async function deleteSeerrRequest(requestId) {
  const btn = document.querySelector(`#sreq-${requestId} .seerr-del-btn`);
  if (btn) { btn.textContent = '...'; btn.style.pointerEvents = 'none'; }
  try {
    const r = await fetch(`/api/seerr/request/${requestId}/delete`, { method: 'POST' });
    const res = await r.json();
    if (res.success) {
      const item = document.getElementById(`sreq-${requestId}`);
      if (item) {
        item.style.opacity = '0.4';
        item.style.pointerEvents = 'none';
        if (btn) { btn.textContent = t('torrent_panel_request_deleted'); btn.classList.add('done'); }
      }
      toast(t('toast_seerr_deleted'), 'success');
    } else {
      if (btn) { btn.textContent = t('torrent_panel_delete_request'); btn.style.pointerEvents = ''; }
      toast(t('toast_error'), 'error');
    }
  } catch(e) {
    if (btn) { btn.textContent = t('torrent_panel_delete_request'); btn.style.pointerEvents = ''; }
  }
}

function closeTorrentPanel() {
  document.getElementById('tp-overlay').classList.remove('open');
  tpMedia = null; tpTorrents = [];
}

function handleTpOverlayClick(e) {
  if (e.target === document.getElementById('tp-overlay')) closeTorrentPanel();
}

function showCacheBadge(label) {
  const badge = document.getElementById('cache-badge');
  const dateEl = document.getElementById('cache-date');
  if (badge) badge.style.display = '';
  if (dateEl) dateEl.textContent = label;
}
function hideCacheBadge() {
  const badge = document.getElementById('cache-badge');
  if (badge) badge.style.display = 'none';
}

async function refreshMedia() {
  const btn = document.getElementById('btn-refresh');
  if (btn) btn.classList.add('spinning');
  clearSessionCache();
  try {
    await Promise.all([checkStatus(), loadStats(), loadMedia(true)]);
    toast(t('toast_reloaded'), 'success');
  } catch(e) {
    toast(t('toast_network_error'), 'error');
  } finally {
    if (btn) btn.classList.remove('spinning');
  }
}

function resizeCards(val) {
  document.documentElement.style.setProperty('--card-min-width', val + 'px');
  try { localStorage.setItem('removarr_card_size', val); } catch(e) {}
}

function initCardSize() {
  try {
    const saved = localStorage.getItem('removarr_card_size');
    if (saved) {
      document.getElementById('size-slider').value = saved;
      resizeCards(saved);
    }
  } catch(e) {}
}

// ─── Init ─────────────────────────────────────────────────────
async function init() {
  await loadLocale();
  initCardSize();
  try {
    const r = await fetch('/api/config-status');
    const cfg = await r.json();
    if (cfg.setup_required) {
      window.location.href = '/setup';
      return;
    }
  } catch(e) { /* si l'API échoue, on charge quand même */ }
  // Restore view mode
  setView(currentView);
  loadAll();
  // Show logout button only if auth is enabled
  fetch('/api/settings').then(r => r.json()).then(d => {
    if (d.auth_enabled) {
      const btn = document.getElementById('btn-logout');
      if (btn) btn.style.display = '';
    }
  }).catch(() => {});
  // Version tooltip on logo
  fetch('/api/version').then(r => r.json()).then(d => {
    const logo = document.getElementById('logo-text');
    if (logo && d.version) logo.title = 'v' + d.version;
  }).catch(() => {});
}
init();

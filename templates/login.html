  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --accent: #e53e3e;
      --accent-hover: #c53030;
      --text: #f0f0f0;
      --text-dim: #888;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .logo-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .logo-sub {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 1px;
    }
    label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 8px;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="password"]:focus, input[type="text"]:focus {
      border-color: rgba(255,255,255,0.2);
    }
    .error-msg {
      font-size: 12px;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 8px;
      min-height: 18px;
    }
    button {
      width: 100%;
      margin-top: 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="36" rx="8" fill="#111" stroke="#e53e3e" stroke-width="1.5"/>
          <g stroke="white" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="10" y1="13" x2="26" y2="13"/>
            <path d="M14 13V11h8v2"/>
            <path d="M24 13l-1.5 13h-9L12 13"/>
            <line x1="15.5" y1="17" x2="15.5" y2="23"/>
            <line x1="18" y1="17" x2="18" y2="23"/>
            <line x1="20.5" y1="17" x2="20.5" y2="23"/>
          </g>
        </svg>
      </div>
      <div>
        <div class="logo-text">Removarr</div>
        <div class="logo-sub">media manager</div>
      </div>
    </div>
    <form method="POST" action="/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autofocus autocomplete="username" placeholder="admin" style="margin-bottom:16px">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" placeholder="••••••••">
      <div class="error-msg">{% if error %}Incorrect username or password.{% endif %}</div>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>

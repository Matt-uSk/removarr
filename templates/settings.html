<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:         #0a0a0f;
    --surface:    #111118;
    --surface2:   #1a1a24;
    --card-bg:    #14141c;
    --border:     #2a2a38;
    --text:       #f0f0f8;
    --text-mid:   #b0b0c8;
    --text-dim:   #666680;
    --accent:     #ff4444;
    --accent-dim: rgba(255,68,68,0.08);
    --green:      #22c55e;
    --yellow:     #f5c518;
    --blue:       #60a5fa;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 50;
    height: 64px;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px;
    gap: 16px;
  }

  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .logo-icon { display:flex; align-items:center; justify-content:center; }
  .logo-text { font-size: 20px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; }
  .logo-text span { color: var(--accent); }

  .header-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    display: flex; align-items: center; gap: 8px;
  }
  .header-title::before {
    content: '/';
    color: var(--border);
  }

  .back-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .back-btn:hover { color: var(--text); border-color: #3a3a50; }
  .back-btn svg { flex-shrink: 0; }

  /* ── Page layout ── */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 36px 24px 80px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .page-title {
    font-size: 24px; font-weight: 800;
    margin-bottom: 4px;
  }
  .page-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    margin-bottom: 8px;
  }

  /* ── Source badge ── */
  .source-badge {
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.5;
  }
  .source-badge.env   { background: #0d1f2d; border: 1px solid #1d3a50; color: #6ab4cf; }
  .source-badge.file  { background: #0d1f0d; border: 1px solid #1d4a1d; color: #6fcf6f; }

  /* ── Service card ── */
  .service-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .service-card:focus-within { border-color: #3a3a50; }

  .service-header {
    padding: 14px 18px;
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .service-name {
    font-size: 15px; font-weight: 700;
    display: flex; align-items: center; gap: 8px;
  }

  .test-btn {
    padding: 5px 16px; border-radius: 6px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); cursor: pointer;
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s; white-space: nowrap;
  }
  .test-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .test-btn:disabled { opacity: 0.4; pointer-events: none; }

  .service-fields {
    padding: 16px 18px;
    display: flex; flex-direction: column; gap: 12px;
  }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label {
    font-size: 10px; font-weight: 700; letter-spacing: .08em;
    text-transform: uppercase; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: #4a4a68; }
  .field input::placeholder { color: var(--text-dim); }

  .secret-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .secret-wrap input { padding-right: 38px; }
  .toggle-eye {
    position: absolute;
    right: 8px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .toggle-eye:hover { color: var(--text); }
  .toggle-eye.visible { color: var(--accent); }

  .field-hint {
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }

  .test-result {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; min-height: 16px;
    padding: 0 2px;
  }
  .test-result.ok  { color: var(--green); }
  .test-result.err { color: var(--accent); }

  /* ── Save bar ── */
  .save-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; z-index: 50;
  }
  .save-hint {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
  }
  .save-hint b { color: var(--text-mid); }

  .save-actions { display: flex; gap: 10px; align-items: center; }

  .btn-reset {
    padding: 9px 18px; border-radius: 8px;
    border: 1px solid var(--border); background: none;
    color: var(--text-dim); font-family: 'Inter', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .btn-reset:hover { color: var(--accent); border-color: var(--accent); }

  .btn-save {
    padding: 9px 24px; border-radius: 8px;
    background: var(--accent); border: none; color: #fff;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: background 0.15s;
    box-shadow: 0 4px 20px rgba(255,68,68,0.3);
  }
  .btn-save:hover { background: #ff2222; }
  .btn-save:disabled { opacity: 0.5; pointer-events: none; }

  /* ── Toast ── */
  .toast-wrap {
    position: fixed; bottom: 80px; right: 24px; z-index: 100;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: toastIn 0.25s ease;
  }
  .toast.ok  { border-color: rgba(34,197,94,0.4); color: var(--green); }
  .toast.err { border-color: rgba(255,68,68,0.4); color: var(--accent); }
  @keyframes toastIn {
    from { opacity:0; transform: translateX(16px); }
    to   { opacity:1; transform: translateX(0); }
  }

  /* ── Loading ── */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 300px; gap: 12px;
    color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-size: 13px;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .version-footer {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.5;
    padding: 16px 0 40px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="28" height="28">
      <rect width="32" height="32" rx="8" fill="#111"/>
      <rect x="1" y="1" width="30" height="30" rx="7.5" fill="none" stroke="#e53e3e" stroke-width="1.5"/>
      <g stroke="white" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M10 13h12l-1.5 11a1 1 0 01-1 .9H12.5a1 1 0 01-1-.9z" stroke-width="1.4"/>
        <line x1="8" y1="13" x2="24" y2="13" stroke-width="1.6"/>
        <path d="M13.5 11.5a.6.6 0 01.6-.5h3.8a.6.6 0 01.6.5V13h-5z" stroke-width="1.3"/>
        <line x1="14" y1="16.5" x2="14" y2="21.5" stroke-width="1.3" opacity="0.6"/>
        <line x1="16" y1="16.5" x2="16" y2="21.5" stroke-width="1.3" opacity="0.6"/>
        <line x1="18" y1="16.5" x2="18" y2="21.5" stroke-width="1.3" opacity="0.6"/>
      </g>
    </svg>
  
  </div>
    <span class="logo-text">Remov<span>arr</span></span>
  </a>
  <div class="header-title" data-i18n="settings_title"></div>
  <a href="/" class="back-btn">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    <span data-i18n="nav_back"></span>
  </a>
</header>

<main id="main">
  <div class="loading-screen">
    <div class="spinner"></div>
    <span data-i18n="loading_generic"></span>
  </div>

</main>

<div class="save-bar">
  <div class="save-hint" id="save-hint">Chargement…</div>
  <div class="save-actions">
    <button class="btn-reset" onclick="resetToEnv()" data-i18n="btn_reset"></button>
    <button class="btn-save" id="btn-save" onclick="saveSettings()" data-i18n="btn_save"></button>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>

// ─── i18n ──────────────────────────────────────────────────────
let _locale = {};
let _availableLangs = [];

function t(key, vars = {}) {
  let str = _locale[key] ?? key;
  Object.entries(vars).forEach(([k, v]) => { str = str.replaceAll('{' + k + '}', v); });
  return str;
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.innerHTML = t(el.getAttribute('data-i18n'));
  });
  document.title = 'Removarr — ' + t('settings_title');
}

async function loadLocale() {
  _availableLangs = await fetch('/api/locales').then(r => r.json()).catch(() => []);
  const langs = _availableLangs.map(l => l.lang);
  const saved = (() => { try { return localStorage.getItem('removarr_lang'); } catch(e) { return null; } })();

  let lang = saved;
  if (!lang || lang === 'auto') {
    const nav = (navigator.language || 'en').split('-')[0].toLowerCase();
    lang = langs.includes(nav) ? nav : (langs.includes('en') ? 'en' : langs[0] || 'en');
  }
  if (!langs.includes(lang)) lang = langs[0] || 'en';

  try {
    _locale = await fetch('/api/locales/' + lang).then(r => r.json());
  } catch(e) { _locale = {}; }
  applyI18n();
  renderLangSelector(saved || 'auto');
}

function renderLangSelector(currentVal) {
  const wrap = document.getElementById('lang-selector-wrap');
  if (!wrap) return;
  const opts = ['auto', ..._availableLangs.map(l => l.lang)];
  const labels = { auto: t('settings_lang_auto') };
  _availableLangs.forEach(l => { labels[l.lang] = l.label; });
  wrap.innerHTML = `
    <label style="font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px">${t('settings_lang_label')}</label>
    <select onchange="changeLang(this.value)" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;font-size:13px;font-family:inherit;cursor:pointer">
      ${opts.map(o => `<option value="${o}" ${o === currentVal ? 'selected' : ''}>${labels[o] || o}</option>`).join('')}
    </select>`;
}

async function changeLang(val) {
  try { localStorage.setItem('removarr_lang', val); } catch(e) {}
  await loadLocale();
  renderPage();
  renderLangSelector(val);
}


function getServices() {
return [
  {
    id: 'radarr', label: 'Radarr', icon: '🎬', color: '#f5c518',
    fields: [
      { key: 'radarr_url',     label: t('settings_field_url'), placeholder: 'http://192.168.0.x:7878' },
      { key: 'radarr_api_key', label: t('settings_field_apikey'), placeholder: '••••••••', secret: true },
    ]
  },
  {
    id: 'sonarr', label: 'Sonarr', icon: '📺', color: '#35c5f4',
    fields: [
      { key: 'sonarr_url',     label: t('settings_field_url'), placeholder: 'http://192.168.0.x:8989' },
      { key: 'sonarr_api_key', label: t('settings_field_apikey'), placeholder: '••••••••', secret: true },
    ]
  },
  {
    id: 'qbit', label: 'qBittorrent', icon: '⚡', color: '#6ec6f5',
    fields: [
      { key: 'qbit_url',      label: t('settings_field_url'), placeholder: 'http://192.168.0.x:8090' },
      { key: 'qbit_username', label: t('settings_field_user'),  placeholder: 'admin' },
      { key: 'qbit_password', label: t('settings_field_password'), placeholder: '••••••••', secret: true },
    ]
  },
  {
    id: 'tmdb', label: 'TMDB', icon: '🎭', color: '#01d277',
    fields: [
      { key: 'tmdb_api_key', label: t('settings_field_apikey_bearer'), placeholder: '••••••••', secret: true },
    ]
  },
  {
    id: 'seerr', label: 'Seerr', icon: '🔭', color: '#c084fc',
    fields: [
      { key: 'seerr_url',     label: t('settings_field_url'), placeholder: 'http://192.168.0.x:5055' },
      { key: 'seerr_api_key', label: t('settings_field_apikey'), placeholder: '••••••••', secret: true },
    ]
  },
  {
    id: 'tautulli', label: 'Tautulli', icon: '📊', color: '#f6ad55',
    fields: [
      { key: 'tautulli_url',     label: t('settings_field_url'), placeholder: 'http://192.168.0.x:8181' },
      { key: 'tautulli_api_key', label: t('settings_field_apikey'), placeholder: '••••••••', secret: true },
    ]
  },
];}


let currentData = {};

async function init() {
  await loadLocale();
  try {
    const r = await fetch('/api/settings');
    currentData = await r.json();
    renderPage();
    renderLangSelector((() => { try { return localStorage.getItem('removarr_lang') || 'auto'; } catch(e) { return 'auto'; } })());
  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div style="color:var(--accent);font-family:monospace;padding:20px">Erreur de chargement: ${e.message}</div>`;
  }
}

function renderPage() {
  const isFile = currentData.source === 'file';
  const hint = isFile
    ? `<div class="source-badge file">✅ ${t('settings_source_file')}</div>`
    : `<div class="source-badge env">ℹ️ ${t('settings_source_env')}</div>`;

  const cards = getServices().map(svc => `
    <div class="service-card">
      <div class="service-header">
        <div class="service-name">
          <span>${svc.icon}</span>
          <span style="color:${svc.color}">${svc.label}</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="test-result" id="res-${svc.id}"></span>
          <button class="test-btn" id="tbtn-${svc.id}" onclick="testService('${svc.id}')">${t('btn_test')}</button>
        </div>
      </div>
      <div class="service-fields">
        ${svc.fields.map(f => {
          const inputId = 'f-' + f.key;
          if (f.secret) {
            return `<div class="field">
              <label>${f.label}</label>
              <div class="secret-wrap">
                <input
                  id="${inputId}"
                  type="password"
                  value="${esc(currentData[f.key] || '')}"
                  placeholder="${f.placeholder}"
                  autocomplete="off"
                  onfocus="if(this.value.includes('••••'))this.value=''"
                />
                <button type="button" class="toggle-eye" onclick="toggleSecret('${inputId}', this)" title="Show/Hide">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
            </div>`;
          }
          return `<div class="field">
            <label>${f.label}</label>
            <input
              id="${inputId}"
              type="text"
              value="${esc(currentData[f.key] || '')}"
              placeholder="${f.placeholder}"
              autocomplete="off"
            />
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');

  document.getElementById('main').innerHTML = `
    <div class="page-title">${t('nav_settings')}</div>
    <div class="page-subtitle">${t('settings_subtitle')}</div>
    ${hint}
    ${cards}
    <div style="height:20px"></div>
    <section class="service-card">
      <div class="service-header">
        <span class="service-name" style="display:flex;align-items:center;gap:8px">🔒 <span>${t('settings_auth_title')}</span></span>
      </div>
      <div class="service-fields">
        <div class="field">
          <label>${t('settings_field_user')}</label>
          <input id="f-removarr_username" type="text" value="${esc(currentData.removarr_username || 'admin')}" placeholder="admin" autocomplete="off"/>
        </div>
        <div class="field">
          <label>${t('settings_field_password')}</label>
          <div class="secret-wrap">
            <input id="f-removarr_password" type="password" value="${esc(currentData.removarr_password || '')}" placeholder="${currentData.auth_enabled ? '••••••••' : t('settings_auth_placeholder')}" autocomplete="off"
              onfocus="if(this.value.includes('••••'))this.value=''"/>
            <button type="button" class="toggle-eye" onclick="toggleSecret('f-removarr_password', this)" title="Show/Hide">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-hint">${currentData.auth_enabled ? '✅ ' + t('settings_auth_enabled') : t('settings_auth_hint')}</div>
        </div>
        <div class="field">
          <label>${t('settings_ip_whitelist')}</label>
          <input id="f-removarr_allowed_ips" type="text" value="${esc(currentData.removarr_allowed_ips || '')}" placeholder="192.168.0.0/24, 10.0.0.1" autocomplete="off"/>
          <div class="field-hint">${t('settings_ip_whitelist_hint')}</div>
        </div>
      </div>
    </section>
    <div style="height:20px"></div>
    <section class="service-card" style="margin-top:12px">
      <div class="service-header">
        <span class="service-name" style="display:flex;align-items:center;gap:8px">🌐 <span data-i18n="settings_lang_label"></span></span>
      </div>
      <div class="service-fields">
        <div id="lang-selector-wrap" style="padding:4px 0"></div>
        <div style="margin-top:10px;padding:10px 12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;line-height:1.6">
          <span data-i18n="settings_lang_contribute"></span>
        </div>
      </div>
    </section>
    <div class="version-footer" id="version-footer"></div>
  `;

  // Fetch version
  fetch('/api/version').then(r => r.json()).then(d => {
    const el = document.getElementById('version-footer');
    if (el && d.version) el.textContent = 'Removarr v' + d.version;
  }).catch(() => {});

  document.getElementById('save-hint').innerHTML = isFile
    ? `${t('settings_saved_file')}`
    : `${t('settings_source_env_active')}`;
  applyI18n();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

async function testService(id) {
  const btn = document.getElementById('tbtn-' + id);
  const res = document.getElementById('res-' + id);
  btn.textContent = '…'; btn.disabled = true;
  res.textContent = ''; res.className = 'test-result';

  const svc = getServices().find(s => s.id === id);
  const payload = {};
  svc.fields.forEach(f => {
    const v = document.getElementById('f-' + f.key)?.value;
    if (v) payload[f.key] = v;
  });

  try {
    const r = await fetch('/api/settings/test/' + id, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (d.ok) {
      res.textContent = '✅' + (d.name ? ' ' + d.name : ' OK');
      res.className = 'test-result ok'; res.textContent = t('settings_test_ok');
    } else {
      res.textContent = t('settings_test_fail', {msg: d.error || 'HTTP ' + d.status});
      res.className = 'test-result err';
    }
  } catch(e) {
    res.textContent = '❌ Erreur réseau';
    res.className = 'test-result err';
  }
  btn.textContent = t('btn_test'); btn.disabled = false;
}

async function saveSettings() {
  const btn = document.getElementById('btn-save');
  btn.textContent = '…'; btn.disabled = true;

  const payload = {};
  getServices().forEach(svc => svc.fields.forEach(f => {
    const v = document.getElementById('f-' + f.key)?.value;
    if (v !== undefined) payload[f.key] = v;
  }));

  // Auth fields
  const authFields = ['removarr_username', 'removarr_password', 'removarr_allowed_ips'];
  authFields.forEach(k => {
    const el = document.getElementById('f-' + k);
    if (el) payload[k] = el.value;
  });

  try {
    const r = await fetch('/api/settings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (d.ok || d.success) {
      toast(t('toast_settings_saved'), 'ok');
      // Reload settings to get fresh state (auth_enabled etc.)
      try {
        const r2 = await fetch('/api/settings');
        currentData = await r2.json();
        renderPage();
        renderLangSelector((() => { try { return localStorage.getItem('removarr_lang') || 'auto'; } catch(e) { return 'auto'; } })());
      } catch(e) {}
    } else {
      toast(d.error || t('toast_settings_error'), 'err');
    }
  } catch(e) {
    toast(t('toast_network_error'), 'err');
  }
  btn.textContent = t('btn_save'); btn.disabled = false;
}

function toggleSecret(inputId, btn) {
  const input = document.getElementById(inputId);
  if (!input) return;
  const isPassword = input.type === 'password';
  input.type = isPassword ? 'text' : 'password';
  btn.classList.toggle('visible', isPassword);
}

async function resetToEnv() {
  if (!confirm(t('settings_reset_confirm'))) return;
  try {
    await fetch('/api/cache/clear', {method:'POST'}); // reuse as cache wipe isn't ideal but we need a reset endpoint
    // Actually call a dedicated reset
    const r = await fetch('/api/settings/reset', {method:'POST'});
    const d = await r.json();
    if (d.success) {
      toast(t('settings_reset_done'), 'ok')
      await init();
    } else {
      toast(t('toast_reset_error'), 'err');
    }
  } catch(e) {
    toast(t('toast_network_error'), 'err');
  }
}

function toast(msg, type='ok') {
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

init();
</script>
</body>
</html>
